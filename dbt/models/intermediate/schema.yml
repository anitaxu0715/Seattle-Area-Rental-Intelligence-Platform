version: 2

models:
  - name: int_candidate_apartment_base
    description: "Candidate apartments with jurisdiction, data coverage, coordinate completeness, hard-filter evaluation, and candidate status"
    columns:
      - name: apartment_id
        tests:
          - not_null
          - unique
      - name: apartment_name
        tests:
          - not_null
      - name: jurisdiction
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['seattle', 'shoreline', 'other_king_county', 'unknown']
      - name: public_data_coverage_level
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['seattle_city_open_data_available', 'shoreline_partial_manual_review', 'king_county_context_possible', 'unknown_or_not_configured']
      - name: data_coverage_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['inside_seattle', 'outside_seattle', 'unknown']
      - name: consideration_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['eligible', 'rejected', 'benchmark']
      - name: has_coordinates
        tests:
          - not_null
      - name: meets_hard_filters
        tests:
          - not_null

  - name: int_rental_registration_matches
    description: "Candidate apartments matched to rental registration records by address"
    columns:
      - name: apartment_id
        tests:
          - not_null
          - unique
      - name: rental_registration_match
        tests:
          - not_null
      - name: match_method
        tests:
          - accepted_values:
              arguments:
                values: ['address_exact', 'no_match']
      - name: match_confidence
        tests:
          - accepted_values:
              arguments:
                values: ['high', 'low', 'not_applicable']

  - name: int_code_violations_near_candidates
    description: "Code violation counts within 500m of each candidate apartment"
    columns:
      - name: apartment_id
        tests:
          - not_null
          - unique

  - name: int_building_permits_near_candidates
    description: "Building permit counts within 500m of each candidate apartment"
    columns:
      - name: apartment_id
        tests:
          - not_null
          - unique
